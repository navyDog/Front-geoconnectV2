server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────
    # Compression gzip
    # ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ──────────────────────────────────────────
    # Cache des assets statiques (hachés par Vite)
    # ──────────────────────────────────────────
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ──────────────────────────────────────────
    # Proxy vers le backend Spring Boot pour /api
    # Reproduit le comportement du proxy Vite :
    #  - Si le header Authorization est absent, on tente de le reconstituer
    #    depuis le cookie temporaire pdf_token (utilisé par window.open).
    #  - Si Authorization est déjà présent (appels Axios), on le conserve.
    # ──────────────────────────────────────────
    location /api {
        # Résolution du header Authorization final :
        #   - priorité au header envoyé par le client (Axios)
        #   - fallback sur le cookie pdf_token (window.open / PDF viewer)
        set $final_auth $http_authorization;
        if ($final_auth = "") {
            set $final_auth "Bearer $cookie_pdf_token";
        }

        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $final_auth;

        # Timeouts adaptés aux uploads de documents
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        client_max_body_size  50m;

        # Suppression du cookie pdf_token avant transmission au backend
        proxy_set_header   Cookie "";
    }

    # ──────────────────────────────────────────
    # SPA fallback : toutes les routes inconnues
    # renvoient index.html (React Router)
    # ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Pas de cache sur index.html
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ──────────────────────────────────────────
    # En-têtes de sécurité
    # ──────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
}

