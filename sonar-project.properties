sonar.projectKey=navyDog_Front-geoconnectV2
sonar.organization=navydog

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=Front-geoconnectV2
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/__tests__/**

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Rapport de couverture généré par vitest --coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Fichiers exclus de l'ANALYSE Sonar (pas de code à analyser)
sonar.exclusions=\
  src/types/**,\
  src/vite-env.d.ts,\
  src/index.css

# Fichiers exclus du CALCUL de couverture :
# - types : interfaces/types TypeScript purs, aucune logique exécutable
# - App.tsx : configuration de routage, pas de logique métier
# - pages/** : composants UI de haut niveau, testés via E2E
# - components/** : composants présentationnels, testés via E2E
sonar.coverage.exclusions=\
  src/types/**,\
  src/vite-env.d.ts,\
  src/main.tsx,\
  src/App.tsx,\
  src/pages/**,\
  src/components/**
